<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <style>
    .box { fill:#ffffff; stroke:#2b6cb0; stroke-width:2; rx:8; }
    .box-ia { fill:#fff7ed; stroke:#dd6b20; }
    .text { font-family: Inter, Arial, sans-serif; font-size:14px; fill:#0f172a; }
    .title { font-size:16px; font-weight:600; }
    .arrow { stroke:#0f172a; stroke-width:2; marker-end: url(#arrowhead); }
    .note { font-size:12px; fill:#475569; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="30" y="28" class="title text">Flux d'analyse IA et alerting</text>

  <!-- Boxes row 1 -->
  <g transform="translate(30,60)">
    <rect class="box" x="0" y="0" width="140" height="60" />
    <text x="70" y="36" text-anchor="middle" class="text">Frontend</text>
  </g>

  <g transform="translate(210,60)">
    <rect class="box" x="0" y="0" width="160" height="60" />
    <text x="80" y="28" text-anchor="middle" class="text">Backend</text>
    <text x="80" y="46" text-anchor="middle" class="note">(conversion, orchestration)</text>
  </g>

  <g transform="translate(410,60)">
    <rect class="box" x="0" y="0" width="160" height="60" />
    <text x="80" y="36" text-anchor="middle" class="text">Storage</text>
  </g>

  <g transform="translate(610,60)">
    <rect class="box-ia" x="0" y="0" width="160" height="60" />
    <text x="80" y="22" text-anchor="middle" class="text">AI Service</text>
    <text x="80" y="40" text-anchor="middle" class="note">Prétraitement, prédiction, heatmap</text>
  </g>

  <g transform="translate(810,60)">
    <rect class="box" x="0" y="0" width="140" height="60" />
    <text x="70" y="36" text-anchor="middle" class="text">DB</text>
  </g>

  <g transform="translate(980,60)">
    <rect class="box" x="0" y="0" width="160" height="60" />
    <text x="80" y="22" text-anchor="middle" class="text">WebSocket</text>
    <text x="80" y="40" text-anchor="middle" class="note">Push vers Frontend</text>
  </g>

  <!-- Arrows row 1 -->
  <line x1="170" y1="90" x2="210" y2="90" class="arrow" />
  <line x1="370" y1="90" x2="410" y2="90" class="arrow" />
  <line x1="570" y1="90" x2="610" y2="90" class="arrow" />
  <line x1="770" y1="90" x2="810" y2="90" class="arrow" />
  <line x1="950" y1="90" x2="980" y2="90" class="arrow" />

  <!-- Storage <- AI (heatmap save) -->
  <line x1="690" y1="140" x2="490" y2="200" class="arrow" />
  <text x="590" y="170" class="note" text-anchor="middle">heatmap_path</text>

  <!-- Backend -> Storage (preview, image) curved -->
  <path d="M 300 120 C 350 155, 430 155, 490 200" fill="none" class="arrow" />
  <text x="420" y="140" class="note" text-anchor="middle">save preview.jpg / image</text>

  <!-- Backend -> IA async -->
  <line x1="370" y1="120" x2="610" y2="120" stroke="#0f172a" stroke-dasharray="6 4" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="490" y="110" class="note" text-anchor="middle">POST /analyse (async)</text>

  <!-- Conditional alert branch -->
  <g>
    <!-- branch arrow from Backend down to Mail/Doctor -->
    <line x1="300" y1="240" x2="300" y2="320" class="arrow" />
    <text x="330" y="260" class="note">if grade ≥ CRITICAL_THRESHOLD</text>

    <rect class="box" x="340" y="300" width="160" height="50" />
    <text x="420" y="330" text-anchor="middle" class="text">Mail Service</text>

    <rect class="box" x="520" y="300" width="160" height="50" />
    <text x="600" y="330" text-anchor="middle" class="text">Doctor</text>

    <line x1="500" y1="325" x2="340" y2="325" class="arrow" />
    <line x1="500" y1="325" x2="680" y2="325" class="arrow" />
  </g>

  <!-- Notes bottom left -->
  <text x="30" y="380" class="note">Flux résumé : Frontend → Backend → Storage → AI Service → Storage (heatmap) → DB → WebSocket → Frontend. Alerting asynchrone vers Mail/Doctor si critique.</text>

</svg>
