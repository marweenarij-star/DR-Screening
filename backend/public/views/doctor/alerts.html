<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertes - DR Screening</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/doctor/dashboard" class="sidebar-brand">
                    <i class="fas fa-eye"></i>
                    <span>DR Screening</span>
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">Médecin</div>
                <ul>
                    <li class="nav-item">
                        <a href="/doctor/dashboard" class="nav-link">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Tableau de bord</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/doctor/patients" class="nav-link" id="sidebar-patients-link">
                            <i class="fas fa-users"></i>
                            <span>Mes patients</span>
                            <span class="nav-badge" id="patients-sidebar-badge" style="display: none;">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/doctor/alerts" class="nav-link active">
                            <i class="fas fa-bell"></i>
                            <span>Alertes</span>
                            <span class="nav-badge" id="alert-badge" style="display: none;">0</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user-md"></i>
                    </div>
                    <div class="user-details">
                        <div class="user-name">Dr. Médecin</div>
                        <div class="user-role">Ophtalmologue</div>
                    </div>
                </div>
                <button class="btn btn-outline sidebar-logout-btn" data-logout>
                    <i class="fas fa-sign-out-alt"></i>
                    Déconnexion
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Alertes</h1>
                    <p class="page-subtitle">Notifications des cas urgents</p>
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="mark-all-read-btn">
                        <i class="fas fa-check-double"></i>
                        Tout marquer comme lu
                    </button>
                </div>
            </div>
            
            <!-- Filter Tabs -->
            <div class="card mb-6">
                <div class="card-body" style="padding: 0.75rem 1rem;">
                    <div class="d-flex gap-4">
                        <button class="btn btn-sm filter-btn active" data-status="unread">
                            Non lues
                            <span class="badge badge-danger" id="count-unread" style="margin-left: 0.5rem;">0</span>
                        </button>
                        <button class="btn btn-sm filter-btn" data-status="unresolved">
                            Non résolues
                        </button>
                        <button class="btn btn-sm filter-btn" data-status="resolved">
                            Résolues
                        </button>
                        <button class="btn btn-sm filter-btn" data-status="all">
                            Toutes
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Alerts List -->
            <div id="alerts-container">
                <div class="card">
                    <div class="card-body">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/js/app.js"></script>
    <script>
        let currentStatus = 'unread';
        
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.checkRole('doctor')) return;
            
            // Update user info
            const user = Auth.getUser();
            document.querySelector('.user-name').textContent = `Dr. ${user.first_name || ''} ${user.last_name || ''}`;
            
            loadAlerts();
            loadAlertCount();
            
            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentStatus = btn.dataset.status;
                    loadAlerts();
                });
            });
            
            // Mark all as read
            document.getElementById('mark-all-read-btn').addEventListener('click', async () => {
                try {
                    await API.post('/doctor/alerts/mark-all-read');
                    Toast.show('Toutes les alertes ont été marquées comme lues', 'success');
                    loadAlerts();
                    loadAlertCount();
                } catch (error) {
                    Toast.show(error.message, 'danger');
                }
            });
        });
        
        async function loadAlertCount() {
            try {
                const response = await API.get('/doctor/alerts/count');
                if (response && response.success) {
                    const badge = document.getElementById('alert-badge');
                    const countBadge = document.getElementById('count-unread');
                    badge.textContent = response.data.unread;
                    countBadge.textContent = response.data.unread;
                    badge.style.display = response.data.unread > 0 ? 'inline' : 'none';
                }
            } catch (error) {
                console.error('Error loading alert count:', error);
            }
        }
        
        async function loadAlerts() {
            const container = document.getElementById('alerts-container');
            
            container.innerHTML = `
                <div class="card">
                    <div class="card-body">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            `;
            
            try {
                const response = await API.get(`/doctor/alerts?status=${currentStatus}`);
                
                if (!response || !response.success) {
                    throw new Error('Erreur de chargement');
                }
                
                const alerts = response.data;
                
                if (alerts.length === 0) {
                    container.innerHTML = `
                        <div class="card">
                            <div class="card-body">
                                <div class="empty-state">
                                    <i class="fas fa-bell-slash"></i>
                                    <h3>Aucune alerte</h3>
                                    <p>Vous n'avez pas d'alertes ${getStatusLabel(currentStatus)}</p>
                                </div>
                            </div>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = alerts.map(alert => `
                    <div class="card mb-4 alert-card ${!alert.is_read ? 'alert-unread' : ''}" data-id="${alert.id}">
                        <div class="card-body">
                            <div class="d-flex justify-between align-center">
                                <div class="d-flex gap-4 align-center" style="flex: 1;">
                                    <div class="alert-icon ${getAlertIconClass(alert.alert_type)}">
                                        <i class="fas fa-${getAlertIcon(alert.alert_type)}"></i>
                                    </div>
                                    <div>
                                        <h4 style="margin-bottom: 0.25rem;">${alert.message}</h4>
                                        <p class="text-muted" style="font-size: 0.875rem;">
                                            ${alert.patient_name ? `Patient: ${alert.patient_name}` : ''}
                                            ${alert.medical_record_number ? `(${alert.medical_record_number})` : ''}
                                            ${alert.grade !== null ? ` • Grade ${alert.grade}` : ''}
                                        </p>
                                        <p class="text-muted" style="font-size: 0.75rem; margin-top: 0.5rem;">
                                            <i class="fas fa-clock"></i> ${DateFormat.relative(alert.created_at)}
                                            ${alert.is_resolved ? '<span class="badge badge-success" style="margin-left: 0.5rem;">Résolue</span>' : ''}
                                        </p>
                                    </div>
                                </div>
                                <div class="btn-group">
                                    ${alert.exam_id ? `
                                        <a href="/doctor/exams/${alert.exam_id}" class="btn btn-sm btn-outline">
                                            <i class="fas fa-eye"></i>
                                            Voir l'examen
                                        </a>
                                    ` : ''}
                                    ${!alert.is_read ? `
                                        <button class="btn btn-sm btn-secondary" onclick="markRead(${alert.id})">
                                            <i class="fas fa-check"></i>
                                            Marquer lu
                                        </button>
                                    ` : ''}
                                    ${!alert.is_resolved ? `
                                        <button class="btn btn-sm btn-success" onclick="resolveAlert(${alert.id})">
                                            <i class="fas fa-check-circle"></i>
                                            Résoudre
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                container.innerHTML = `
                    <div class="card">
                        <div class="card-body text-center text-danger">
                            Erreur de chargement : ${error.message}
                        </div>
                    </div>
                `;
            }
        }
        
        async function markRead(id) {
            try {
                await API.put(`/doctor/alerts/${id}/read`);
                Toast.show('Alerte marquée comme lue', 'success');
                loadAlerts();
                loadAlertCount();
            } catch (error) {
                Toast.show(error.message, 'danger');
            }
        }
        
        async function resolveAlert(id) {
            try {
                await API.put(`/doctor/alerts/${id}/resolve`);
                Toast.show('Alerte résolue', 'success');
                loadAlerts();
                loadAlertCount();
            } catch (error) {
                Toast.show(error.message, 'danger');
            }
        }
        
        function getStatusLabel(status) {
            switch (status) {
                case 'unread': return 'non lues';
                case 'unresolved': return 'non résolues';
                case 'resolved': return 'résolues';
                default: return '';
            }
        }
        
        function getAlertIcon(type) {
            switch (type) {
                case 'urgent': return 'exclamation-triangle';
                case 'new_exam': return 'eye';
                default: return 'bell';
            }
        }
        
        function getAlertIconClass(type) {
            switch (type) {
                case 'urgent': return 'alert-icon-urgent';
                case 'new_exam': return 'alert-icon-info';
                default: return 'alert-icon-default';
            }
        }
        
        // Make loadAlerts available globally for WebSocket updates
        window.loadAlerts = loadAlerts;
    </script>
    
    <style>
        .alert-card {
            transition: all 0.2s;
        }
        
        .alert-unread {
            border-left: 4px solid var(--danger);
            background-color: rgba(229, 57, 53, 0.02);
        }
        
        .alert-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        
        .alert-icon-urgent {
            background-color: rgba(229, 57, 53, 0.1);
            color: var(--danger);
        }
        
        .alert-icon-info {
            background-color: rgba(3, 155, 229, 0.1);
            color: var(--info);
        }
        
        .alert-icon-default {
            background-color: rgba(0, 137, 123, 0.1);
            color: var(--primary);
        }
        
        .filter-btn {
            background: none;
            border: none;
            color: var(--gray-600);
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background-color: var(--gray-100);
            color: var(--gray-900);
        }
        
        .filter-btn.active {
            background-color: var(--primary);
            color: var(--white);
        }
    </style>
</body>
</html>
