<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - DR Screening</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-eye"></i>
            <h1>DR Screening</h1>
            <p>Système de dépistage de la rétinopathie diabétique</p>
        </div>
        
        <form id="login-form">
            <div id="login-error" class="alert alert-danger hidden">
                <i class="fas fa-exclamation-circle"></i>
                <span></span>
            </div>
            
            <div class="form-group">
                <label class="form-label required" for="email">Adresse email</label>
                <input type="email" id="email" name="email" class="form-control" 
                       placeholder="votre@email.com" required autofocus>
                <div class="invalid-feedback"></div>
            </div>
            
            <div class="form-group">
                <label class="form-label required" for="password">Mot de passe</label>
                <input type="password" id="password" name="password" class="form-control" 
                       placeholder="••••••••" required>
                <div class="invalid-feedback"></div>
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Se connecter</span>
                </button>
            </div>
        </form>
    </div>
    
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Redirect if already logged in
            if (Auth.isAuthenticated()) {
                const user = Auth.getUser();
                if (user.must_change_password) {
                    window.location.href = '/set-password';
                    return;
                }
                if (user.role === 'super_admin') {
                    window.location.href = '/super/dashboard';
                } else if (user.role === 'center_admin') {
                    window.location.href = '/center/dashboard';
                } else {
                    window.location.href = '/doctor/dashboard';
                }
                return;
            }
            
            const form = document.getElementById('login-form');
            const errorDiv = document.getElementById('login-error');
            const loginBtn = document.getElementById('login-btn');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                // Clear errors
                errorDiv.classList.add('hidden');
                form.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
                
                // Validate
                if (!email || !password) {
                    errorDiv.querySelector('span').textContent = 'Veuillez remplir tous les champs';
                    errorDiv.classList.remove('hidden');
                    return;
                }
                
                // Submit
                loginBtn.disabled = true;
                loginBtn.querySelector('span').textContent = 'Connexion...';
                
                try {
                    const data = await Auth.login(email, password);
                    
                    if (data) {
                        if (data.user.must_change_password) {
                            window.location.href = '/set-password';
                            return;
                        }

                        if (data.user.role === 'super_admin') {
                            window.location.href = '/super/dashboard';
                        } else if (data.user.role === 'center_admin') {
                            window.location.href = '/center/dashboard';
                        } else {
                            window.location.href = '/doctor/dashboard';
                        }
                    }
                } catch (error) {
                    errorDiv.querySelector('span').textContent = error.message || 'Email ou mot de passe incorrect';
                    errorDiv.classList.remove('hidden');
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.querySelector('span').textContent = 'Se connecter';
                }
            });
        });
    </script>
</body>
</html>
