<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choisir mon mot de passe - DR Screening</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-lock"></i>
            <h1>Choisir mon mot de passe</h1>
            <p>Définissez votre mot de passe personnel avant d'accéder à l'application</p>
        </div>

        <form id="password-form">
            <div id="password-error" class="alert alert-danger hidden">
                <i class="fas fa-exclamation-circle"></i>
                <span></span>
            </div>

            <div class="form-group">
                <label class="form-label required" for="new_password">Nouveau mot de passe</label>
                <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Nouveau mot de passe" required minlength="6" autofocus>
                <div class="invalid-feedback"></div>
            </div>

            <div class="form-group">
                <label class="form-label required" for="confirm_password">Confirmer le mot de passe</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Répéter le nouveau mot de passe" required minlength="6">
                <div class="invalid-feedback"></div>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="save-btn">
                    <i class="fas fa-save"></i>
                    <span>Enregistrer le mot de passe</span>
                </button>
            </div>
        </form>

        <div class="demo-accounts">
            <p class="demo-accounts-title">Sécurité</p>
            <p>Le mot de passe temporaire doit être remplacé avant l'accès au tableau de bord.</p>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/app.js"></script>
    <script>
        function redirectByRole(user) {
            if (!user) return;
            if (user.role === 'super_admin') {
                window.location.href = '/views/super/dashboard.html';
            } else if (user.role === 'center_admin') {
                window.location.href = '/views/center/dashboard.html';
            } else {
                window.location.href = '/views/doctor/dashboard.html';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.checkAuth()) return;

            const user = Auth.getUser();
            if (user && !user.must_change_password) {
                redirectByRole(user);
                return;
            }

            const form = document.getElementById('password-form');
            const errorDiv = document.getElementById('password-error');
            const saveBtn = document.getElementById('save-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const new_password = document.getElementById('new_password').value;
                const confirm_password = document.getElementById('confirm_password').value;

                errorDiv.classList.add('hidden');
                form.querySelectorAll('.is-invalid').forEach((el) => el.classList.remove('is-invalid'));

                if (!new_password || !confirm_password) {
                    errorDiv.querySelector('span').textContent = 'Veuillez remplir tous les champs';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                if (new_password.length < 6) {
                    errorDiv.querySelector('span').textContent = 'Le nouveau mot de passe doit contenir au moins 6 caractères';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                if (new_password !== confirm_password) {
                    errorDiv.querySelector('span').textContent = 'La confirmation ne correspond pas';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                saveBtn.disabled = true;
                saveBtn.querySelector('span').textContent = 'Enregistrement...';

                try {
                    await api.post('/auth/change-password', { new_password });

                    const updatedUser = { ...Auth.getUser(), must_change_password: false };
                    TokenManager.setUser(updatedUser);
                    alert('Mot de passe mis à jour avec succès');
                    redirectByRole(updatedUser);
                } catch (error) {
                    errorDiv.querySelector('span').textContent = error.message || 'Impossible de changer le mot de passe';
                    errorDiv.classList.remove('hidden');
                } finally {
                    saveBtn.disabled = false;
                    saveBtn.querySelector('span').textContent = 'Enregistrer le mot de passe';
                }
            });
        });
    </script>
</body>
</html>
