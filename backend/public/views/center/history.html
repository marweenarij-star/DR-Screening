<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique - DR Screening</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-theme-center">
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/views/center/dashboard.html" class="sidebar-brand">
                    <i class="fas fa-hospital"></i>
                    <span>Admin Centre</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">Gestion</div>
                <ul>
                    <li class="nav-item">
                        <a href="/views/center/dashboard.html" class="nav-link">
                            <i class="fas fa-chart-line"></i>
                            <span>Tableau de bord</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/views/center/doctors.html" class="nav-link">
                            <i class="fas fa-stethoscope"></i>
                            <span>Médecins</span>
                        </a>
                    </li>
                </ul>
                <div class="nav-section">Dépistage</div>
                <ul>
                    <li class="nav-item"><a href="/views/center/new-exam.html" class="nav-link"><i class="fas fa-plus-circle"></i><span>Nouvel examen</span></a></li>
                    <li class="nav-item"><a href="/views/center/history.html" class="nav-link active"><i class="fas fa-clock-rotate-left"></i><span>Historique</span></a></li>
                    <li class="nav-item"><a href="/views/center/support.html" class="nav-link"><i class="fas fa-life-ring"></i><span>Support & Assistance</span></a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user-tie"></i></div>
                    <div class="user-details">
                        <div class="user-name" id="center-admin-name">Admin</div>
                        <div class="user-role" id="center-name">Centre</div>
                    </div>
                </div>
                <button class="btn btn-outline sidebar-logout-btn" data-logout>
                    <i class="fas fa-sign-out-alt"></i>
                    Déconnexion
                </button>
            </div>
        </aside>

         <main class="main-content">

            <section class="card mb-6">
                <div class="card-body">
                    <div class="search-toolbar" style="margin-bottom: 1rem;">
                        <input type="text" class="form-control" id="history-search" placeholder="Rechercher par patient, dossier ou médecin...">
                        <button class="btn btn-secondary" id="history-search-btn"><i class="fas fa-search"></i> Rechercher</button>
                        <button class="btn btn-outline" id="history-reset-btn"><i class="fas fa-rotate-left"></i> Réinitialiser</button>
                    </div>
                    <div class="table-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nom</th>
                                    <th>Prénom</th>
                                    <th>Œil affecté</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                                <tbody id="history-table">
                                    <tr><td colspan="6" class="table-empty"><div class="loading"><div class="spinner"></div></div></td></tr>
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/app.js"></script>
    <script>
        let currentPage = 1;

        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.isAuthenticated()) {
                window.location.href = '/views/login.html';
                return;
            }

            const user = Auth.getUser();
            if (user.role !== 'center_admin') {
                window.location.href = '/views/login.html';
                return;
            }

            document.getElementById('center-admin-name').textContent = user.name || 'Admin';
            document.getElementById('history-search-btn').addEventListener('click', () => loadHistory(1));
            document.getElementById('history-reset-btn').addEventListener('click', () => {
                document.getElementById('history-search').value = '';
                loadHistory(1);
            });
            document.getElementById('history-search').addEventListener('keypress', (event) => {
                if (event.key === 'Enter') loadHistory(1);
            });

            loadHistory();
        });

        async function loadHistory(page = currentPage) {
            currentPage = page;
            const search = String(document.getElementById('history-search').value || '').trim();
            const tbody = document.getElementById('history-table');
            tbody.innerHTML = '<tr><td colspan="5" class="table-empty"><div class="loading"><div class="spinner"></div></div></td></tr>';

            try {
                const params = new URLSearchParams({ page: String(page), per_page: '20' });
                if (search) params.set('search', search);

                const response = await API.get(`/center/exams/history?${params.toString()}`);
                if (!response || !response.success) {
                    throw new Error(response?.error || 'Erreur de chargement');
                }

                const exams = response.data.exams || [];
                if (!exams.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="table-empty"><div class="empty-state"><i class="fas fa-folder-open"></i><h3>Aucun historique trouvé</h3><p>Les examens envoyés apparaîtront ici.</p></div></td></tr>';
                    return;
                }

                tbody.innerHTML = exams.map((exam) => `
                    <tr>
                        <td><strong>${escapeHtml(exam.medical_record_number || '-')}</strong></td>
                        <td>${escapeHtml(exam.last_name || '-')}</td>
                        <td>${escapeHtml(exam.first_name || '-')}</td>
                        <td><span class="badge badge-secondary">${escapeHtml(formatEyeGroup(exam.eye))}</span></td>
                        <td>${DateFormat.format(exam.created_at)}</td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">${escapeHtml(error.message || 'Erreur')}</td></tr>`;
            }
        }

        function formatEyeGroup(eye) {
            if (eye === 'OG&OD' || eye === 'OD&OG' || eye === 'left+right' || eye === 'right+left') return 'OG&OD';
            if (String(eye || '').includes('right') && String(eye || '').includes('left')) return 'OG&OD';
            if (eye === 'right') return 'OD';
            if (eye === 'left') return 'OG';
            if (eye === 'OD') return 'OD';
            if (eye === 'OG') return 'OG';
            return 'Non spécifié';
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    </script>
</body>
</html>
